name: Curation review
description: Kick off a scheduled or ad-hoc review pass of the curated list.
title: "Curation review: <quarter> <year>"
labels: ["curation", "maintenance"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to open a curation review pass. Work through the checklist in [REVIEW.md](https://github.com/natnew/awesome-physical-ai/blob/main/REVIEW.md) (local copy) or the [Review process](https://natnew.github.io/awesome-physical-ai/docs/workflow-review) docs page. Submit all changes in a single PR titled **Curation review: \<quarter\> \<year\>**.
  - type: dropdown
    id: review-period
    attributes:
      label: Review period
      options:
        - Q1 (Jan–Mar)
        - Q2 (Apr–Jun)
        - Q3 (Jul–Sep)
        - Q4 (Oct–Dec)
        - Ad-hoc
    validations:
      required: true
  - type: input
    id: year
    attributes:
      label: Year
      placeholder: "2026"
    validations:
      required: true
  - type: input
    id: reviewer
    attributes:
      label: Reviewer
      description: GitHub handle, or "open" if unassigned.
      placeholder: "@yourhandle"
    validations:
      required: true
  - type: checkboxes
    id: categories-to-review
    attributes:
      label: Categories to review
      description: Uncheck any categories being deliberately skipped this pass.
      options:
        - label: Simulators
          required: false
        - label: Datasets
          required: false
        - label: Benchmarks
          required: false
        - label: Evaluation Methodology
          required: false
        - label: Robotics Foundation Models
          required: false
        - label: World Models
          required: false
        - label: Manipulation
          required: false
        - label: Locomotion
          required: false
        - label: Sim-to-Real
          required: false
        - label: Safety & Robustness
          required: false
        - label: Governance & Policy
          required: false
        - label: Production Patterns
          required: false
        - label: Courses
          required: false
        - label: Companies
          required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Known issues, specific categories of concern, or context for this review pass.
    validations:
      required: false
