name: link-check

on:
  pull_request:
    paths:
      - README.md
      - website/docs/**
      - .lycheeignore
      - .github/workflows/link-check.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - website/docs/**
      - .lycheeignore
      - .github/workflows/link-check.yml

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Lychee link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run lychee
        uses: lycheeverse/lychee-action@7cd0af4c74a61395d455af97419279d86aafaede # v2.0.2
        with:
          # Single source of truth for what we link-check.
          # MDX is parsed cleanly by lychee; markdown-link-check is the documented fallback.
          args: >-
            --no-progress
            --max-retries 2
            --cache
            --max-cache-age 1d
            README.md
            "website/docs/**/*.md"
            "website/docs/**/*.mdx"
          fail: true
