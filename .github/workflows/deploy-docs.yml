name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - website/**
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Resolve deployment URL settings
        shell: bash
        run: |
          CUSTOM_DOMAIN="${{ vars.DOCUSAURUS_CUSTOM_DOMAIN }}"
          EXPLICIT_SITE_URL="${{ vars.DOCUSAURUS_SITE_URL }}"
          EXPLICIT_BASE_URL="${{ vars.DOCUSAURUS_BASE_URL }}"

          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "DOCUSAURUS_CUSTOM_DOMAIN=$CUSTOM_DOMAIN" >> "$GITHUB_ENV"
            echo "DOCUSAURUS_SITE_URL=https://$CUSTOM_DOMAIN" >> "$GITHUB_ENV"
            if [ -n "$EXPLICIT_BASE_URL" ]; then
              echo "DOCUSAURUS_BASE_URL=$EXPLICIT_BASE_URL" >> "$GITHUB_ENV"
            else
              echo "DOCUSAURUS_BASE_URL=/" >> "$GITHUB_ENV"
            fi
          else
            if [ -n "$EXPLICIT_SITE_URL" ]; then
              echo "DOCUSAURUS_SITE_URL=$EXPLICIT_SITE_URL" >> "$GITHUB_ENV"
            else
              echo "DOCUSAURUS_SITE_URL=https://natnew.github.io" >> "$GITHUB_ENV"
            fi

            if [ -n "$EXPLICIT_BASE_URL" ]; then
              echo "DOCUSAURUS_BASE_URL=$EXPLICIT_BASE_URL" >> "$GITHUB_ENV"
            else
              echo "DOCUSAURUS_BASE_URL=/awesome-physical-ai/" >> "$GITHUB_ENV"
            fi
          fi

      - name: Add CNAME for custom domain
        if: ${{ vars.DOCUSAURUS_CUSTOM_DOMAIN != '' }}
        working-directory: website/static
        shell: bash
        run: |
          printf '%s\n' "${{ vars.DOCUSAURUS_CUSTOM_DOMAIN }}" > CNAME

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4